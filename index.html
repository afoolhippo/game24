<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>セコムボーイ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- タイトル -->
<section id="titleScreen" class="screen active">

  <img
    id="titleImage"
    src="title.png"
    alt="セコムボーイ"
  >

  <p id="titleRule">
    不審者をタップ！<br>
    セコムボーイが町を巡回します。
  </p>

  <button id="startBtn">
    タップしてスタート
  </button>

</section>

<!-- ゲーム -->
<section id="gameScreen" class="screen">

  <button id="titleBackBtn">
    タイトルへ戻る
  </button>

  <div id="topBar">

    <div class="timeBox">
      TIME <span id="time">30</span>
    </div>

    <div class="scoreBox">
      対応数 <span id="score">0</span>
    </div>

  </div>

  <div id="mapWrap">

    <div id="map">

      <div id="roads"></div>

      <!-- 家 -->
      <div class="house" id="house1"></div>
      <div class="house" id="house2"></div>
      <div class="house" id="house3"></div>
      <div class="house" id="house4"></div>
      <div class="house" id="house5"></div>
      <div class="house" id="house6"></div>
      <div class="house" id="house7"></div>
      <div class="house" id="house8"></div>
      <div class="house" id="house9"></div>
      <div class="house" id="house10"></div>
      <div class="house" id="house11"></div>
      <div class="house" id="house12"></div>

      <!-- 不審者 -->
      <img class="suspect hidden" id="suspect1" src="dorobou.png">
      <img class="suspect hidden" id="suspect2" src="dorobou.png">
      <img class="suspect hidden" id="suspect3" src="dorobou.png">
      <img class="suspect hidden" id="suspect4" src="dorobou.png">
      <img class="suspect hidden" id="suspect5" src="dorobou.png">
      <img class="suspect hidden" id="suspect6" src="dorobou.png">
      <img class="suspect hidden" id="suspect7" src="dorobou.png">
      <img class="suspect hidden" id="suspect8" src="dorobou.png">
      <img class="suspect hidden" id="suspect9" src="dorobou.png">
      <img class="suspect hidden" id="suspect10" src="dorobou.png">
      <img class="suspect hidden" id="suspect11" src="dorobou.png">
      <img class="suspect hidden" id="suspect12" src="dorobou.png">

      <!-- セコムボーイ -->
      <img id="boy" src="secomboy.png">

      <!-- 詰所 -->
      <div id="base">
        詰所
      </div>

    </div>

  </div>

</section>

<!-- リザルト -->
<section id="resultScreen" class="screen">

  <h2 id="rankTitle">
    即駆けつけ
  </h2>

  <img
    id="resultImage"
    src=""
    alt="result"
  >

  <div id="finalScore">
    14件対応
  </div>

  <p id="resultComment">
    今日も被害を未然に防いだ。
  </p>

  <button id="shareBtn">
    Xでシェア
  </button>

  <div id="resultButtons">

    <button id="retryBtn">
      もう1回遊ぶ
    </button>

    <button id="homeBtn">
      カバゲーセンへ
    </button>

  </div>

</section>

</div>

<script src="game.js"></script>
</body>
</html>
